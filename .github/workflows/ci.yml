name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  device-free-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync deps
        run: uv sync --frozen || uv sync
      - name: Run the device-free test suite
        run: uv run python -m pytest -q
      - name: Python 3.9 AST conformance is enforced by the suite (test_py39_compat)
        run: echo "py39 compat asserted in-suite"
